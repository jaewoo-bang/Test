<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영진전문대학교 - 통합 회원가입</title>
  <!-- SEO 메타 태그 -->
  <meta name="description" content="영진전문대학교의 스마트한 학사 서비스를 이용하기 위한 통합 회원가입 페이지입니다.">
  <meta name="keywords" content="영진전문대, 회원가입, 영진전문대학교, 대학서비스">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="data:,">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Supabase CDN Client JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- 배경 애니메이션 요소 -->
  <div class="background-decorations">
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
  </div>

  <div class="container">
    <!-- 회원가입 카드 -->
    <main class="signup-card">
      
      <!-- 카드 헤더 (브랜드 로고 영역) -->
      <header class="card-header">
        <div class="brand-logo">
          <!-- 영진전문대학교의 상징적 컬러와 심볼을 조화롭게 형상화한 SVG -->
          <svg viewBox="0 0 100 100" class="logo-svg" aria-hidden="true">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#4F46E5" />
                <stop offset="100%" stop-color="#06B6D4" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-dasharray="200 40" />
            <path d="M30 35 L50 65 L70 35" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M50 20 L50 50" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" />
          </svg>
        </div>
        <h1 class="brand-title">YEUNGJIN</h1>
        <p class="brand-subtitle">영진전문대학교 통합 회원가입</p>
      </header>

      <!-- 회원가입 폼 -->
      <form id="signupForm" class="signup-form" novalidate>
        
        <!-- 아이디 필드 -->
        <div class="input-group" id="group-username">
          <label for="username">
            <span class="label-text">아이디</span>
            <span class="required-mark">*</span>
          </label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user input-icon"></i>
            <input 
              type="text" 
              id="username" 
              name="username" 
              placeholder="영문 소문자/숫자, 4~15자" 
              autocomplete="username" 
              required
            >
            <i class="fa-solid fa-circle-check status-icon success-icon"></i>
            <i class="fa-solid fa-circle-exclamation status-icon error-icon"></i>
          </div>
          <p class="validation-message" id="error-username" role="alert"></p>
        </div>

        <!-- 비밀번호 필드 -->
        <div class="input-group" id="group-password">
          <label for="password">
            <span class="label-text">비밀번호</span>
            <span class="required-mark">*</span>
          </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="영문, 숫자, 특수문자 조합 8자 이상" 
              autocomplete="new-password" 
              required
            >
            <button type="button" class="btn-toggle-password" tabindex="-1" aria-label="비밀번호 표시">
              <i class="fa-regular fa-eye eye-close-icon"></i>
              <i class="fa-regular fa-eye-slash eye-open-icon"></i>
            </button>
            <i class="fa-solid fa-circle-check status-icon success-icon"></i>
            <i class="fa-solid fa-circle-exclamation status-icon error-icon"></i>
          </div>
          <!-- 비밀번호 강도 인디케이터 -->
          <div class="pw-strength-meter">
            <div class="strength-bar"></div>
          </div>
          <p class="validation-message" id="error-password" role="alert"></p>
        </div>

        <!-- 비밀번호 확인 필드 -->
        <div class="input-group" id="group-password-confirm">
          <label for="passwordConfirm">
            <span class="label-text">비밀번호 확인</span>
            <span class="required-mark">*</span>
          </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-shield-halved input-icon"></i>
            <input 
              type="password" 
              id="passwordConfirm" 
              name="passwordConfirm" 
              placeholder="비밀번호를 한번 더 입력해 주세요" 
              autocomplete="new-password" 
              required
            >
            <i class="fa-solid fa-circle-check status-icon success-icon"></i>
            <i class="fa-solid fa-circle-exclamation status-icon error-icon"></i>
          </div>
          <p class="validation-message" id="error-password-confirm" role="alert"></p>
        </div>

        <!-- 이메일 필드 -->
        <div class="input-group" id="group-email">
          <label for="email">
            <span class="label-text">이메일</span>
            <span class="required-mark">*</span>
          </label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="example@yju.ac.kr" 
              autocomplete="email" 
              required
            >
            <i class="fa-solid fa-circle-check status-icon success-icon"></i>
            <i class="fa-solid fa-circle-exclamation status-icon error-icon"></i>
          </div>
          <p class="validation-message" id="error-email" role="alert"></p>
        </div>

        <!-- 전화번호 필드 -->
        <div class="input-group" id="group-phone">
          <label for="phone">
            <span class="label-text">전화번호</span>
            <span class="required-mark">*</span>
          </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-mobile-screen-button input-icon"></i>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              placeholder="010-XXXX-XXXX" 
              autocomplete="tel" 
              required
            >
            <i class="fa-solid fa-circle-check status-icon success-icon"></i>
            <i class="fa-solid fa-circle-exclamation status-icon error-icon"></i>
          </div>
          <p class="validation-message" id="error-phone" role="alert"></p>
        </div>

        <!-- 약관 동의 체크박스 (UX 완성도 높이기용) -->
        <div class="terms-group">
          <label class="checkbox-container">
            <input type="checkbox" id="agreeTerms" required>
            <span class="checkmark"></span>
            <span class="terms-text">개인정보 수집 및 이용에 동의합니다. <span class="required-mark">(필수)</span></span>
          </label>
          <p class="validation-message" id="error-terms" role="alert"></p>
        </div>

        <!-- 제출 버튼 -->
        <button type="submit" id="submitBtn" class="btn-submit">
          <span class="btn-text">회원가입 신청</span>
          <i class="fa-solid fa-arrow-right btn-icon"></i>
        </button>

      </form>
      
      <!-- 카드 푸터 -->
      <footer class="card-footer">
        <p>이미 계정이 있으신가요? <a href="login.html" class="login-link">로그인 바로가기</a></p>
      </footer>

    </main>
  </div>

  <!-- 가입 성공 모달 (Modal Popup) -->
  <div id="successModal" class="modal-overlay" aria-hidden="true" role="dialog">
    <div class="modal-content">
      <div class="modal-icon-wrapper">
        <div class="modal-success-check">
          <span class="check-line line-tip"></span>
          <span class="check-line line-long"></span>
          <div class="check-circle"></div>
          <div class="check-fix"></div>
        </div>
      </div>
      <h2 class="modal-title">가입을 환영합니다!</h2>
      <p class="modal-message">영진전문대학교 학생 통합 계정 생성이 정상적으로 완료되었습니다.</p>
      
      <!-- 회원가입 결과 요약 카드 -->
      <div class="summary-box">
        <div class="summary-row">
          <span class="summary-label">아이디</span>
          <span class="summary-value" id="summary-username">-</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">이메일</span>
          <span class="summary-value" id="summary-email">-</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">전화번호</span>
          <span class="summary-value" id="summary-phone">-</span>
        </div>
      </div>

      <button type="button" id="modalCloseBtn" class="btn-modal-close">확인</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
